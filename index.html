<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Music Player</title>
<link rel="manifest" href="manifest.json">

<style>
/* Base setup */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(90deg, #0f0f2d, #1a0033);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh; /* ✅ better than fixed height */
  padding: 20px;     /* ✅ spacing for small screens */
}

.container {
  display: flex;
  gap: 40px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center; /* ✅ center on all screens */
}

/* Vinyl Disk */
.vinyl {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, #111 60%, #0ff 80%, #f0f 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 0 30px #0ff, 0 0 60px #f0f;
  flex-shrink: 0; /* ✅ prevent shrinking */
}

.vinyl.playing {
  animation: spin 6s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}

.vinyl-text {
  color: #0ff;
  font-weight: bold;
  text-shadow: 0 0 10px #f0f;
}

/* Controls */
.controls {
  display: flex;
  gap: 15px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center; /* ✅ center buttons */
}

.controls button {
  background: none;
  border: 2px solid #0ff;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  color: #fff;
  cursor: pointer;
  transition: .3s;
  box-shadow: 0 0 10px #0ff, 0 0 20px #f0f;
}

.controls button:hover {
  background: #0ff;
  color: #000;
  transform: scale(1.2);
}

/* Progress Bar */
.progress {
  width: 100%;
  max-width: 500px; /* ✅ limit width on large screens */
  height: 6px;
  background: #333;
  margin: 20px auto;
  border-radius: 5px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, #0ff, #f0f);
}

/* Playlist */
.playlist {
  background: rgba(20, 20, 40, .9);
  border-radius: 15px;
  padding: 15px;
  width: 250px;
  box-shadow: 0 0 20px #0ff, 0 0 40px #f0f;
  max-height: 300px;
  overflow-y: auto;
}

.playlist div {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-bottom: 1px solid #444;
  cursor: pointer;
  transition: .3s;
}

.playlist div img {
  width: 40px;
  height: 40px;
  border-radius: 5px;
  box-shadow: 0 0 10px #0ff;
  transition: .5s;
}

.playlist div:hover img {
  transform: rotate(100deg) scale(1.1);
}

.playlist div:hover {
  background: rgba(0, 255, 255, .2);
  transform: translateX(5px);
}

.active {
  background: rgba(255, 0, 255, .3);
}

/* 📱 Mobile screens */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
    gap: 20px;
  }

  .vinyl {
    width: 150px;
    height: 150px;
  }

  .playlist {
    width: 100%; /* ✅ full width on mobile */
    max-width: 350px;
  }

  .controls button {
    width: 40px;
    height: 40px;
  }
}

/* 💻 Tablet screens */
@media (min-width: 769px) and (max-width: 1024px) {
  .container {
    flex-direction: row;
    gap: 30px;
  }

  .vinyl {
    width: 180px;
    height: 180px;
  }

  .playlist {
    width: 220px;
  }
}
</style>

</head>
<body>
<div class="container">
  <div>
    <div class="vinyl" id="vinyl"><div class="vinyl-text">@A$K@</div></div>

    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>

    <div class="controls">
      <button id="prev">⏮</button><button id="play">▶</button>
      <button id="next">⏭</button><button id="shuffle">🔀</button>
      
      <button id="repeat">🔁</button>
    </div>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
  </div>
  <div class="playlist" id="playlist"></div>
</div>

<audio id="audio"></audio>
<script>



 if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }



const audio=document.getElementById("audio"),
playBtn=document.getElementById("play"),

let isPlaying=false,
isShuffle=false,
currentIndex=0;
const songs = [

    "cover": "https://picsum.photos/50?2"
  },
  {

   {

    "cover": "https://picsum.photos/50?2"
  },

];

function loadSong(i){audio.src=songs[i].src;highlight(i);

}
function playSong(){
  audio.play();
  playBtn.textContent="⏸";
  vinyl.classList.add("playing");
  isPlaying=true;
}


function pauseSong(){
  audio.pause();
  playBtn.textContent="▶";
  vinyl.classList.remove("playing");
  isPlaying=false;
}


playBtn.onclick=()=>isPlaying?pauseSong():playSong();
audio.ontimeupdate=()=>progressBar.style.width=(audio.currentTime/audio.duration*100)+"%";


document.getElementById("prev").onclick=()=>{currentIndex=(currentIndex-1+songs.length)%songs.length;
  loadSong(currentIndex);
  playSong();
}
document.getElementById("next").onclick=()=>{currentIndex=isShuffle?Math.floor(Math.random()*songs.length):(currentIndex+1)%songs.length;
  loadSong(currentIndex);
  playSong();
}
document.getElementById("shuffle").onclick=()=>{isShuffle=!isShuffle;
  alert("Shuffle "+(isShuffle?"On":"Off"));
}
document.getElementById("repeat").onclick=()=>{audio.loop=!audio.loop;
  alert("Repeat "+(audio.loop?"On":"Off"));
}
volume.oninput=()=>audio.volume=volume.value;
function buildPlaylist(){playlistDiv.innerHTML="";
songs.forEach((s,i)=>{const d=document.createElement("div"),img=document.createElement("img");
img.src=s.cover;
const t=document.createElement("span");
t.textContent=s.title+" — "+s.artist;
d.append(img,t);
d.onclick=()=>{currentIndex=i;
  loadSong(i);
  playSong();
};
playlistDiv.appendChild(d);
});
highlight(currentIndex);
}
function highlight(i){playlistDiv.querySelectorAll("div").forEach((el,idx)=>el.classList.toggle("active",idx===i));

}
loadSong(currentIndex);buildPlaylist();
// repeat logic here
document.getElementById("repeat").onclick = () => {
  audio.loop = !audio.loop; // toggle loop
  document.getElementById("repeat").style.background = audio.loop ? "#0ff" : "none"; 
};
// shuffle logic here
document.getElementById("shuffle").onclick = () => {
  isShuffle = !isShuffle;
  document.getElementById("shuffle").style.background = isShuffle ? "#0ff" : "none";
};

document.getElementById("next").onclick = () => {
  currentIndex = isShuffle 
    ? Math.floor(Math.random() * songs.length) 
    : (currentIndex + 1) % songs.length;
  loadSong(currentIndex);
  playSong();
};

// Progress bar click seek
document.querySelector(".progress").addEventListener("click", (e) => {
  const bar = e.currentTarget;
  const percent = e.offsetX / bar.offsetWidth;   // click position ratio
  audio.currentTime = percent * audio.duration;  // jump to that time
});

</script>
</body>
</html>
